<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>???</title>

    body {
      background: black;
      color: #ff0000;
      font-family: "Share Tech Mono", monospace;
      text-align: center;
      padding-top: 20%;
      overflow: hidden;
    }

    h1 {
      font-size: 4em;
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }

      color: black;
    }

    body:hover {
      cursor: crosshair;
    }
  </style>
</head>
